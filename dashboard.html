<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- font integrity  -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="navbar bg-white border-b px-4 md:px-10 py-4 sticky top-0 z-50 flex justify-between">
        <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" class="w-8" alt="Logo">
            <span class="font-bold text-xl text-gray-800 hidden sm:block">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                  <button onclick="searchIssues()" class="absolute right-2 top-2 text-gray-400 text-sm hover:text-indigo-600 transition">
    <i class="fa-solid fa-magnifying-glass"></i>
</button>
                <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered input-sm w-40 md:w-64 focus:outline-none">
              
            </div>
            <button class="btn btn-primary btn-sm bg-[#5811f5] border-none text-white px-4 md:px-6">+ New Issue</button>
        </div>
    </nav>

   
    <script src="script/index.js"></script>
</body>
</html>
