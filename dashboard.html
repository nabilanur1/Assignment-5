<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- font integrity  -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

 <nav class="navbar bg-white border-b px-4 md:px-10 py-4 sticky top-0 z-50 flex justify-between">
    <div class="flex items-center gap-2">
        <img src="assets/github-logo.png" class="w-8" alt="Logo">
        <span class="font-bold text-xl text-gray-800 hidden sm:block">GitHub Issues Tracker</span>
    </div>
    
    <div class="flex items-center gap-4">
        <div class="relative flex items-center">
            <span class="absolute left-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" id="searchInput" oninput="searchIssues()" placeholder="Search issues..." 
                   class="input input-bordered input-sm pl-10 w-48 md:w-80 focus:outline-none focus:border-[#5811f5] rounded-md">
        </div>
        <button class="btn btn-primary btn-sm bg-[#5811f5] hover:bg-indigo-700 border-none text-white px-6 rounded-md">+ New Issue</button>
    </div>
</nav>
<!-- .........  -->
    <main class="max-w-[1300px] mx-auto p-10">
        <div class="flex bg-white border rounded-lg w-fit mb-8 overflow-hidden">
            <button onclick="loadIssues('all', this)" class="tab-item px-10 py-2 font-bold border-r bg-[#5811f5] text-white">All</button>
            <button onclick="loadIssues('open', this)" class="tab-item px-10 py-2 font-bold border-r hover:bg-gray-50 transition">Open</button>
            <button onclick="loadIssues('closed', this)" class="tab-item px-10 py-2 font-bold hover:bg-gray-50 transition">Closed</button>
        </div>

        <div class="bg-white border rounded-xl p-6 mb-8 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-4 rounded-full text-indigo-600"><img src="assets/Aperture.png" alt=""></div>
                <div>
                    <h2 class="text-2xl font-black font-semibold"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-x text-gray-400 ">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6 text-sm font-black">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500"></span> Open</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Closed</span>
            </div>
        </div>

        <div id="loader" class="flex justify-center py-20 ">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
            </div>
    </main>

<dialog id="issue_modal" class="modal">
  <div class="modal-box max-w-2xl p-0 overflow-hidden" id="modalContent"></div>

  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

    <script src="script/index.js"></script>
</body>
</html>
