<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Top border styles for cards */
        .border-open { border-top: 5px solid #22c55e !important; }
        .border-closed { border-top: 5px solid #a855f7 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="navbar bg-white border-b px-10 py-4 flex justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="Logo">
            <span class="font-bold text-xl text-gray-800">GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-4">
            <div class="relative">
                <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">🔍</span>
                <input type="text" id="searchInput" oninput="searchIssues()" placeholder="Search issues..." class="input input-bordered input-sm pl-9 w-64 focus:outline-none">
            </div>
            <button class="btn btn-primary btn-sm bg-[#5811f5] border-none text-white px-6">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-[1300px] mx-auto p-10">
        <div class="flex bg-white border rounded-lg w-fit mb-8 overflow-hidden">
            <button onclick="loadIssues('all', this)" class="tab-item px-10 py-2 font-bold border-r bg-[#5811f5] text-white">All</button>
            <button onclick="loadIssues('open', this)" class="tab-item px-10 py-2 font-bold border-r hover:bg-gray-50 transition">Open</button>
            <button onclick="loadIssues('closed', this)" class="tab-item px-10 py-2 font-bold hover:bg-gray-50 transition">Closed</button>
        </div>

        <div class="bg-white border rounded-xl p-6 mb-8 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-4 rounded-full text-indigo-600">🌀</div>
                <div>
                    <h2 class="text-2xl font-black text-gray-800"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-xs text-gray-400 font-bold">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6 text-sm font-black">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500"></span> Open</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Closed</span>
            </div>
        </div>

        <div id="loader" class="flex justify-center py-20 ">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
            </div>
    </main>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-lg p-0 overflow-hidden" id="modalContent">
            </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="script/index.js"></script>
</body>
</html>
